# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo in Render Dashboard → New → Blueprint

databases:
  - name: turnover-log-db
    databaseName: turnoverlog
    user: turnoverlog
    plan: free

services:
  - type: web
    name: turnover-log-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./server/TurnoverLog.Api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: turnover-log-db
          property: connectionString
      - key: Jwt__Issuer
        value: TurnoverLog
      - key: Jwt__Audience
        value: TurnoverLogClient
      - key: Jwt__Key
        generateValue: true
      - key: ClientOrigin
        sync: false
      - key: Email__Enabled
        value: "true"
      - key: Email__SmtpHost
        sync: false
